name: Pull request validation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  release-policy:
    name: release-policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Install the test runner
        run: python -m pip install "pytest>=8,<9"
      - name: Test the policy checker
        run: python -m pytest tests/test_check_pr_policy.py -q
      - name: Check release policy
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/check_pr_policy.py "$BASE_SHA" "$HEAD_SHA"

  python-tests:
    name: python-tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Install the test runner
        run: python -m pip install "pytest>=8,<9"
      - name: Run Python tests
        run: python -m pytest tests/ -q

  board:
    name: board
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: board/package-lock.json
      - name: Install board dependencies
        working-directory: board
        run: npm ci
      - name: Run board tests
        working-directory: board
        run: npm test
      - name: Check board types
        working-directory: board
        run: npx tsc --noEmit
      - name: Rebuild the shipped board
        working-directory: board
        run: npm run build
      - name: Check the shipped board is current
        run: git diff --exit-code -- skills/managing-planboard/assets/board-template.html

  hosted-board:
    name: hosted-board
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/managing-planboard/assets/web-template
    steps:
      - name: Check out the pull request
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: skills/managing-planboard/assets/web-template/package-lock.json
      - name: Install hosted board dependencies
        run: npm ci
      - name: Run hosted board tests
        run: npm test
