<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planboard</title>
    <!-- Pre-paint theme boot (v0.11): stored choice wins, else OS preference.
         Runs before the app module so a dark user never sees a light flash. -->
    <script>try{var t=localStorage.getItem("pb-board:theme")||localStorage.getItem("rp-board:theme");var d=t==="dark"||(t!=="light"&&matchMedia("(prefers-color-scheme: dark)").matches);if(d)document.documentElement.classList.add("dark")}catch(e){}</script>
  </head>
  <body>
    <div id="root"></div>
    <script id="board-data" type="application/json">{}</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
